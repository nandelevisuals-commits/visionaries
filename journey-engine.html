<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NANDYVISUALS — Journey Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080808; color: #f0f0f0; font-family: 'Space Mono', monospace; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #0f0f0f; }
  ::-webkit-scrollbar-thumb { background: #ff2d78; border-radius: 2px; }
  .tbtn, .cbtn, .chip { cursor: pointer; border: none; transition: all 0.18s ease; }
  .tbtn:hover { transform: translateY(-2px); }
  .cbtn:hover { opacity: 0.75; }
  .chip:hover { transform: scale(1.04); }
  .scard { transition: all 0.2s ease; border-left: 2px solid #1a1a1a; }
  .scard:hover { border-left-color: #ff2d78; transform: translateX(4px); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 0 #ff2d7800} 50%{box-shadow:0 0 20px #ff2d7825} }
  @keyframes connectorPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .fade-up { animation: fadeUp 0.5s ease forwards; }
  .vp { animation: glow 3s ease infinite; }
  .connector { animation: connectorPulse 2s ease infinite; }
  input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:2px; background:#1e1e1e; border-radius:2px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:#ff2d78; border-radius:50%; cursor:pointer; transition:transform 0.15s; box-shadow: 0 0 6px #ff2d7860; }
  input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.4); }
  textarea { resize:none; outline:none; font-family: 'Space Mono', monospace; }
  textarea::placeholder { color:#222; }
  .scene-number { width: 28px; height: 28px; border-radius: 50%; background: #ff2d78; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .journey-line { width: 1px; height: 24px; background: linear-gradient(to bottom, #ff2d78, #ff2d7820); margin: 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const TOGGLES = [
  { id: "kawaii", label: "KAWAII", emoji: "🎀", desc: "Pastel · floaty · whimsical" },
  { id: "luxury", label: "LUXURY", emoji: "💎", desc: "Slow motion · clean · fashion" },
  { id: "blockbuster", label: "BLOCKBUSTER", emoji: "🎬", desc: "Max speed · chaos · aggressive" },
  { id: "ugc", label: "UGC", emoji: "📱", desc: "iPhone · vlog · reaction" },
];

const SLIDERS = [
  { id: "speed", label: "SPEED", left: "SLOW", right: "FAST" },
  { id: "tone", label: "TONE", left: "CALM", right: "CHAOTIC" },
  { id: "aesthetic", label: "AESTHETIC", left: "RAW", right: "CINEMATIC" },
  { id: "scale", label: "SCALE", left: "GROUNDED", right: "SURREAL" },
];

const VIBE_CHIPS = [
  "soft apocalypse", "crying in a luxury hotel", "editorial fever dream",
  "dreamcore underwater", "Wes Anderson meets horror", "golden hour chaos",
  "silent disco in space", "tender violence", "slow motion heartbreak",
  "ethereal street documentary", "Japanese coastal solitude", "forever yours",
];

const JOURNEY_ARCS = [
  { id: "arrival", label: "ARRIVAL", desc: "She enters a world → discovers it → belongs to it" },
  { id: "departure", label: "DEPARTURE", desc: "She leaves something behind → moves through → finds what's next" },
  { id: "transformation", label: "TRANSFORMATION", desc: "She begins one way → world shifts her → she ends changed" },
  { id: "search", label: "SEARCH", desc: "She looks for something → world gives her clues → she finds it" },
  { id: "surrender", label: "SURRENDER", desc: "She resists → the world pulls her → she lets go" },
  { id: "return", label: "RETURN", desc: "She comes back → sees with new eyes → world is different now" },
];

function buildVibePreview(toggles, sliders, customVibe, arc) {
  const parts = [];
  const s = sliders;
  if (s.speed < 30) parts.push("slow-burning pace");
  else if (s.speed > 70) parts.push("rapid-fire pace");
  else parts.push("measured pace");
  if (s.tone < 30) parts.push("emotionally still");
  else if (s.tone > 70) parts.push("chaotic energy");
  else parts.push("balanced tension");
  if (s.aesthetic < 30) parts.push("raw unfiltered look");
  else if (s.aesthetic > 70) parts.push("highly cinematic framing");
  else parts.push("editorial feel");
  if (s.scale > 70) parts.push("surreal world-bending");
  else if (s.scale < 30) parts.push("grounded physics");
  if (toggles.length > 0) parts.push(toggles.map(t => t.toUpperCase()).join(" + ") + " aesthetic");
  if (customVibe.trim()) parts.push(`"${customVibe.trim()}" energy`);
  if (arc) parts.push(`${arc.label} arc`);
  return parts.length ? `Your journey: ${parts.join(", ")}.` : "Set your vibe and choose a journey arc to preview your direction.";
}

function App() {
  const [image, setImage] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [imageMime, setImageMime] = useState("image/jpeg");
  const [textPrompt, setTextPrompt] = useState("");
  const [inputMode, setInputMode] = useState("image"); // "image" or "text"
  const [activeToggles, setActiveToggles] = useState([]);
  const [sliders, setSliders] = useState({ speed: 50, tone: 50, aesthetic: 70, scale: 50 });
  const [customVibe, setCustomVibe] = useState("");
  const [selectedArc, setSelectedArc] = useState(null);
  const [vibePreview, setVibePreview] = useState("");
  const [output, setOutput] = useState(null);
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [error, setError] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    setVibePreview(buildVibePreview(activeToggles, sliders, customVibe, selectedArc));
  }, [activeToggles, sliders, customVibe, selectedArc]);

  const handleImage = (file) => {
    if (!file) return;
    setImage(URL.createObjectURL(file));
    setImageMime(file.type || "image/jpeg");
    const reader = new FileReader();
    reader.onload = (e) => setImageBase64(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
    setOutput(null);
    setError(null);
  };

  const toggleActive = (id) => {
    setActiveToggles((prev) => prev.includes(id) ? prev.filter((t) => t !== id) : [...prev, id]);
  };

  const setSlider = (id, val) => setSliders((prev) => ({ ...prev, [id]: Number(val) }));

  const buildSystemPrompt = () => {
    const s = sliders;
    const speedDesc = s.speed < 30 ? "very slow deliberate pacing" : s.speed > 70 ? "fast rapid-fire pacing" : "moderate pacing";
    const toneDesc = s.tone < 30 ? "emotionally calm and still" : s.tone > 70 ? "chaotic and high-energy" : "balanced tension";
    const aestheticDesc = s.aesthetic < 30 ? "raw handheld unfiltered" : s.aesthetic > 70 ? "highly cinematic composed framing" : "semi-polished editorial";
    const scaleDesc = s.scale < 30 ? "grounded real-world physics" : s.scale > 70 ? "surreal world-bending" : "mild surrealism";
    const arcInfo = selectedArc ? `JOURNEY ARC: ${selectedArc.label} — ${selectedArc.desc}` : "JOURNEY ARC: Choose the most cinematically appropriate arc based on the image/prompt.";

    return `You are the cinematic journey director for NANDYVISUALS — a creative studio building AI-generated editorial films using Seedance 2.0.

Your job is fundamentally different from a standard video prompt generator. You do NOT generate one moment repeated with different effects. You build a JOURNEY — 6 connected scenes where the subject travels through different locations, emotional states, and moments. Each scene must earn the next.

${arcInfo}

VIBE CONFIGURATION:
- Speed: ${speedDesc} (${s.speed}/100)
- Tone: ${toneDesc} (${s.tone}/100)  
- Aesthetic: ${aestheticDesc} (${s.aesthetic}/100)
- Scale: ${scaleDesc} (${s.scale}/100)
- Preset toggles: ${activeToggles.length > 0 ? activeToggles.map(t => t.toUpperCase()).join(" + ") : "none"}
- Custom vibe: ${customVibe.trim() || "none — use creative judgment"}

TOGGLE EFFECTS:
- KAWAII: pastel palette, softer physics, floaty motion, whimsical environmental interactions
- LUXURY: slow motion dominance, clean compositions, fashion-editorial framing, fewer cuts
- BLOCKBUSTER: aggressive camera, high stakes, motion blur, fast escalation between scenes
- UGC: handheld feel, intimate framing, reaction-based energy, talking-to-camera moments

CHARACTER CONSISTENCY RULE — THIS IS NON-NEGOTIABLE:
Step 1: Extract an exact character description from the image or prompt provided. Include:
- Exact skin tone (e.g. "deep brown skin", "medium warm brown skin")
- Exact hair description (type, length, style, color — e.g. "long box braids", "voluminous natural coils", "sleek low bun")
- Exact outfit (every piece — color, fabric, silhouette)
- Any distinctive features (jewelry, bare feet, etc.)

Step 2: This EXACT character description must appear word-for-word at the top of EVERY scene's seedancePrompt. Do not vary it. Do not say "same woman as before." Write it out in full every time. This is how Seedance maintains character consistency across generations.

JOURNEY RULES:
1. Each of the 6 scenes must be in a DIFFERENT location or physical space
2. The emotional state of the subject must shift or deepen between scenes
3. Scene 1 establishes who she is and where she is
4. Scenes 2-5 move her through different moments — she travels, discovers, reacts, transforms
5. Scene 6 resolves the journey — where has she arrived emotionally?
6. NO scene can be "same location, different effect" — if she's on a floating island in Scene 1, she must leave it by Scene 2 or 3

LOCATION VARIETY REQUIREMENT:
Pull from different spatial scales across the 6 scenes:
- Intimate (close-up, interior, small space)
- Medium (a street, a field, a room)
- Wide (landscape, sky, ocean, crowd)
- Surreal (impossible space, transformed environment)
Mix these — never use the same scale twice in a row.

SEEDANCE PROMPT STRUCTURE (for each scene):
Line 1: CHARACTER LOCK — full exact description of subject (copied identically every scene)
Line 2: LOCATION — exact setting, time of day, light quality
Line 3: ACTION — what she does physically (must involve actual movement, not just standing)
Line 4: CAMERA — angle, movement, speed
Line 5: ATMOSPHERE — weather, particles, environmental detail, color grade

OUTPUT — respond ONLY in this exact JSON, no markdown, no preamble:
{
  "title": "cinematic title for this journey — evocative, not generic",
  "arc": "name of the journey arc being used",
  "characterLock": "the exact character description extracted and locked — this is what repeats in every scene",
  "journeyLogic": "one paragraph: the emotional logic of this 6-scene journey — where does she start, what moves her, where does she end",
  "scenes": [
    {
      "number": 1,
      "timestamp": "0:00 – 0:06",
      "label": "SCENE LABEL — LOCATION NAME",
      "location": "where she is",
      "emotionalState": "what she is feeling/experiencing",
      "seedancePrompt": "5-line Seedance 2.0 prompt following the structure above — character lock on line 1 every time",
      "camera": "camera behavior",
      "transitionToNext": "how this scene physically or emotionally connects to the next"
    }
  ],
  "editingNotes": "how to stitch these 6 clips together in CapCut — transition types, pacing, color grade suggestion",
  "caption": "TikTok/Threads viral caption with emojis",
  "hooks": ["hook 1", "hook 2", "hook 3"]
}

Generate exactly 6 scenes. Make this feel like a film, not a content post.`;
  };

  const canGenerate = (inputMode === "image" && imageBase64) || (inputMode === "text" && textPrompt.trim().length > 10);

  const generate = async () => {
    if (!canGenerate) return;
    setLoading(true);
    setOutput(null);
    setError(null);
    try {
      const userContent = inputMode === "image" && imageBase64
        ? [
            { type: "image", source: { type: "base64", media_type: imageMime, data: imageBase64 } },
            { type: "text", text: "Analyze this image, extract and lock the character description, then build the complete 6-scene journey. Apply the full vibe configuration. Output ONLY valid JSON." }
          ]
        : [{ type: "text", text: `Build a complete 6-scene journey from this prompt: "${textPrompt}". Create a protagonist that fits this world, lock their description, and build the journey. Apply the full vibe configuration. Output ONLY valid JSON.` }];

      const response = await fetch("/api/proxy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 5000,
          system: buildSystemPrompt(),
          messages: [{ role: "user", content: userContent }],
        }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || `Error ${response.status}`);
      const text = data.content?.map((b) => b.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      setOutput(JSON.parse(clean));
    } catch (err) {
      setError(err.message || "Generation failed. Try again.");
    }
    setLoading(false);
  };

  const copyText = (text, id) => {
    navigator.clipboard.writeText(text);
    setCopied(id);
    setTimeout(() => setCopied(null), 2000);
  };

  const copyAllPrompts = () => {
    if (!output?.scenes) return;
    const charLock = output.characterLock ? `CHARACTER LOCK (paste at top of every generation):\n${output.characterLock}\n\n${"─".repeat(50)}\n\n` : "";
    const all = output.scenes.map((s) => `[SCENE ${s.number} — ${s.label}]\n${s.seedancePrompt}`).join("\n\n─────────────────\n\n");
    copyText(charLock + all, "all");
  };

  const toggleColors = { kawaii: "#ff6eb4", luxury: "#c9a84c", blockbuster: "#ff2d78", ugc: "#00e5cc" };
  const darkText = { ugc: true, luxury: true };

  return (
    <div style={{ minHeight: "100vh", background: "#080808", overflowX: "hidden" }}>

      {/* Header */}
      <div style={{ borderBottom: "1px solid #111", padding: "16px 22px", display: "flex", alignItems: "center", gap: "12px", background: "#080808", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ width: "26px", height: "26px", background: "linear-gradient(135deg, #ff2d78, #00e5cc)", borderRadius: "4px" }} />
        <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: "17px", letterSpacing: "1px", color: "#fff" }}>NANDYVISUALS</span>
        <span style={{ background: "transparent", color: "#ff2d78", fontSize: "8px", fontWeight: "700", padding: "2px 8px", borderRadius: "2px", letterSpacing: "2px", border: "1px solid #ff2d78" }}>JOURNEY ENGINE</span>
      </div>

      <div style={{ maxWidth: "820px", margin: "0 auto", padding: "32px 18px" }}>

        {/* Hero */}
        <div style={{ marginBottom: "40px" }}>
          <h1 style={{ fontFamily: "'DM Serif Display', serif", fontSize: "clamp(28px, 7vw, 58px)", lineHeight: "1.05", color: "#fff", fontWeight: "400" }}>
            From one image<br /><em style={{ color: "#ff2d78" }}>to a complete journey.</em>
          </h1>
          <p style={{ marginTop: "12px", color: "#333", fontSize: "10px", letterSpacing: "2px" }}>6 SCENES · CHARACTER LOCKED · SEEDANCE 2.0 READY</p>
        </div>

        {/* 01 — Input */}
        <div style={{ marginBottom: "32px" }}>
          <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#ff2d78", marginBottom: "12px", fontWeight: "700" }}>01 — YOUR STARTING POINT</div>

          {/* Mode toggle */}
          <div style={{ display: "flex", gap: "8px", marginBottom: "14px" }}>
            {["image", "text"].map((mode) => (
              <button key={mode} className="tbtn" onClick={() => setInputMode(mode)} style={{
                background: inputMode === mode ? "#ff2d78" : "#0f0f0f",
                border: `1px solid ${inputMode === mode ? "#ff2d78" : "#1a1a1a"}`,
                borderRadius: "6px", padding: "8px 16px",
                fontSize: "9px", letterSpacing: "2px", color: inputMode === mode ? "#fff" : "#444",
                fontFamily: "'Space Mono', monospace", fontWeight: "700",
              }}>{mode === "image" ? "📷 IMAGE" : "✍️ TEXT PROMPT"}</button>
            ))}
          </div>

          {inputMode === "image" ? (
            <div
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={(e) => { e.preventDefault(); setDragOver(false); handleImage(e.dataTransfer.files[0]); }}
              onClick={() => fileRef.current.click()}
              style={{ border: `2px dashed ${dragOver ? "#ff2d78" : image ? "#00e5cc" : "#1a1a1a"}`, borderRadius: "10px", overflow: "hidden", cursor: "pointer", background: "#0a0a0a", minHeight: image ? "auto" : "150px", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}
            >
              {image ? (
                <div style={{ position: "relative", width: "100%" }}>
                  <img src={image} alt="" style={{ width: "100%", maxHeight: "320px", objectFit: "cover", display: "block" }} />
                  <div style={{ position: "absolute", bottom: "10px", right: "10px", background: "#00e5cc", color: "#000", fontSize: "8px", fontWeight: "700", padding: "4px 9px", borderRadius: "3px", letterSpacing: "1px" }}>CHARACTER LOCKED ✓</div>
                </div>
              ) : (
                <div style={{ textAlign: "center", padding: "32px" }}>
                  <div style={{ fontSize: "28px", marginBottom: "8px" }}>🎬</div>
                  <div style={{ color: "#2a2a2a", fontSize: "11px" }}>Drop image — character will be extracted and locked</div>
                  <div style={{ color: "#1a1a1a", fontSize: "9px", marginTop: "4px" }}>JPG · PNG · WEBP</div>
                </div>
              )}
            </div>
          ) : (
            <textarea
              value={textPrompt}
              onChange={(e) => setTextPrompt(e.target.value)}
              placeholder="Describe your protagonist and starting world... e.g. 'A Black woman in a flowing pink dress standing on a floating island in the clouds'"
              rows={4}
              style={{ width: "100%", background: "#0a0a0a", border: "1px solid #1a1a1a", borderRadius: "10px", padding: "14px 16px", color: "#e0e0e0", fontSize: "12px", lineHeight: "1.7" }}
            />
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => handleImage(e.target.files[0])} />

          {image && inputMode === "image" && (
            <div style={{ marginTop: "8px", padding: "10px 14px", background: "#0a0f0a", border: "1px solid #0d2a0d", borderRadius: "6px", fontSize: "10px", color: "#3a8a3a" }}>
              ✓ Character description will be auto-extracted from this image and locked across all 6 scenes
            </div>
          )}
        </div>

        {/* 02 — Journey Arc */}
        <div style={{ marginBottom: "32px" }}>
          <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#ff2d78", marginBottom: "12px", fontWeight: "700" }}>02 — CHOOSE YOUR JOURNEY ARC</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "7px" }}>
            {JOURNEY_ARCS.map((arc) => {
              const active = selectedArc?.id === arc.id;
              return (
                <button key={arc.id} className="tbtn" onClick={() => setSelectedArc(active ? null : arc)} style={{
                  background: active ? "#1a0810" : "#0a0a0a",
                  border: `1px solid ${active ? "#ff2d78" : "#141414"}`,
                  borderRadius: "8px", padding: "12px 14px", textAlign: "left",
                }}>
                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", fontWeight: "700", letterSpacing: "1px", color: active ? "#ff2d78" : "#555", marginBottom: "4px" }}>{arc.label}</div>
                  <div style={{ fontSize: "9px", color: active ? "#888" : "#2a2a2a", lineHeight: "1.4" }}>{arc.desc}</div>
                </button>
              );
            })}
          </div>
          {!selectedArc && (
            <div style={{ marginTop: "8px", fontSize: "9px", color: "#333", fontStyle: "italic" }}>No arc selected — AI will choose the most fitting arc automatically</div>
          )}
        </div>

        {/* 03 — Vibe */}
        <div style={{ marginBottom: "32px" }}>
          <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#ff2d78", marginBottom: "14px", fontWeight: "700" }}>03 — DIAL YOUR VIBE</div>

          <div style={{ fontSize: "8px", color: "#222", letterSpacing: "1px", marginBottom: "8px" }}>PRESET MODES</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "6px", marginBottom: "22px" }}>
            {TOGGLES.map((t) => {
              const active = activeToggles.includes(t.id);
              const col = toggleColors[t.id];
              const dk = darkText[t.id];
              return (
                <button key={t.id} className="tbtn" onClick={() => toggleActive(t.id)} style={{
                  background: active ? col : "#0a0a0a",
                  border: `1px solid ${active ? "transparent" : "#141414"}`,
                  borderRadius: "8px", padding: "11px 6px", textAlign: "center",
                }}>
                  <div style={{ fontSize: "17px", marginBottom: "4px" }}>{t.emoji}</div>
                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", fontWeight: "700", letterSpacing: "1px", color: active ? (dk ? "#000" : "#fff") : "#333" }}>{t.label}</div>
                  <div style={{ fontSize: "8px", marginTop: "3px", color: active ? (dk ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.55)") : "#222", lineHeight: "1.3" }}>{t.desc}</div>
                </button>
              );
            })}
          </div>

          <div style={{ fontSize: "8px", color: "#222", letterSpacing: "1px", marginBottom: "10px" }}>FINE-TUNE DIMENSIONS</div>
          <div style={{ display: "flex", flexDirection: "column", gap: "14px", marginBottom: "22px" }}>
            {SLIDERS.map((s) => (
              <div key={s.id}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "7px" }}>
                  <span style={{ fontSize: "9px", letterSpacing: "1px", color: "#666", fontWeight: "700" }}>{s.label}</span>
                  <span style={{ fontSize: "9px", color: "#ff2d78", fontWeight: "700" }}>{sliders[s.id]}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                  <span style={{ fontSize: "8px", color: "#2a2a2a", minWidth: "56px" }}>{s.left}</span>
                  <input type="range" min="0" max="100" value={sliders[s.id]} onChange={(e) => setSlider(s.id, e.target.value)} />
                  <span style={{ fontSize: "8px", color: "#2a2a2a", minWidth: "56px", textAlign: "right" }}>{s.right}</span>
                </div>
              </div>
            ))}
          </div>

          <div style={{ fontSize: "8px", color: "#222", letterSpacing: "1px", marginBottom: "8px" }}>CUSTOM VIBE</div>
          <textarea
            value={customVibe}
            onChange={(e) => setCustomVibe(e.target.value)}
            placeholder={`"Japanese coastal solitude" · "forever yours" · "tender violence"`}
            rows={2}
            style={{ width: "100%", background: "#0a0a0a", border: "1px solid #141414", borderRadius: "8px", padding: "10px 13px", color: "#ddd", fontSize: "11px", lineHeight: "1.6", marginBottom: "8px" }}
          />

          <div style={{ display: "flex", flexWrap: "wrap", gap: "5px", marginBottom: "14px" }}>
            {VIBE_CHIPS.map((v) => (
              <button key={v} className="chip" onClick={() => setCustomVibe(customVibe === v ? "" : v)} style={{
                background: customVibe === v ? "#ff2d78" : "#0d0d0d",
                border: `1px solid ${customVibe === v ? "#ff2d78" : "#161616"}`,
                borderRadius: "20px", padding: "3px 10px",
                fontSize: "9px", color: customVibe === v ? "#fff" : "#333",
                fontFamily: "'Space Mono', monospace",
              }}>{v}</button>
            ))}
          </div>

          <div className="vp" style={{ padding: "12px 15px", background: "#090909", border: "1px solid #141414", borderRadius: "8px" }}>
            <div style={{ fontSize: "8px", color: "#00e5cc", letterSpacing: "2px", marginBottom: "5px", fontWeight: "700" }}>⚡ JOURNEY PREVIEW</div>
            <div style={{ fontSize: "11px", color: "#555", lineHeight: "1.6", fontStyle: "italic" }}>{vibePreview}</div>
          </div>
        </div>

        {/* 04 — Generate */}
        <div style={{ marginBottom: "40px" }}>
          <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#ff2d78", marginBottom: "10px", fontWeight: "700" }}>04 — BUILD THE JOURNEY</div>
          <button onClick={generate} disabled={!canGenerate || loading} className="cbtn" style={{
            width: "100%", padding: "20px",
            background: canGenerate && !loading ? "linear-gradient(135deg, #ff2d78 0%, #c4006a 100%)" : "#0d0d0d",
            border: "none", borderRadius: "10px",
            color: canGenerate && !loading ? "#fff" : "#222",
            fontFamily: "'DM Serif Display', serif", fontSize: "22px", letterSpacing: "1px",
            cursor: canGenerate && !loading ? "pointer" : "not-allowed",
            display: "flex", alignItems: "center", justifyContent: "center", gap: "10px",
          }}>
            {loading
              ? <><span style={{ fontFamily: "'Space Mono'", fontSize: "11px", animation: "pulse 0.9s infinite", display: "inline-block" }}>⚡</span> <span style={{ fontFamily: "'Space Mono'", fontSize: "11px", letterSpacing: "3px" }}>BUILDING 6-SCENE JOURNEY...</span></>
              : <>Build the Journey →</>}
          </button>
        </div>

        {error && (
          <div style={{ padding: "14px", background: "#110303", border: "1px solid #2a0000", borderRadius: "8px", color: "#ff5555", fontSize: "11px", marginBottom: "20px" }}>
            ⚠ {error}
          </div>
        )}

        {/* Output */}
        {output && !error && (
          <div className="fade-up">

            {/* Journey header */}
            <div style={{ padding: "24px", background: "#0a0a0a", border: "1px solid #141414", borderRadius: "12px", marginBottom: "20px" }}>
              <div style={{ fontSize: "8px", color: "#00e5cc", letterSpacing: "2px", marginBottom: "6px" }}>ARC: {output.arc}</div>
              <h2 style={{ fontFamily: "'DM Serif Display', serif", fontSize: "clamp(22px, 5vw, 38px)", color: "#fff", lineHeight: "1.15", marginBottom: "14px", fontWeight: "400" }}>
                {output.title}
              </h2>
              {output.journeyLogic && (
                <div style={{ fontSize: "11px", color: "#555", lineHeight: "1.7", borderTop: "1px solid #111", paddingTop: "14px", fontStyle: "italic" }}>
                  {output.journeyLogic}
                </div>
              )}
            </div>

            {/* Character lock */}
            {output.characterLock && (
              <div style={{ padding: "14px 16px", background: "#080f08", border: "1px solid #0d2a0d", borderRadius: "8px", marginBottom: "20px", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "12px" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "8px", color: "#3a8a3a", letterSpacing: "2px", marginBottom: "6px", fontWeight: "700" }}>🔒 CHARACTER LOCK — PASTE IN EVERY GENERATION</div>
                  <div style={{ fontSize: "11px", color: "#5a9a5a", lineHeight: "1.6" }}>{output.characterLock}</div>
                </div>
                <button className="cbtn" onClick={() => copyText(output.characterLock, "char")} style={{
                  background: copied === "char" ? "#3a8a3a" : "#0d1f0d", color: copied === "char" ? "#fff" : "#3a8a3a",
                  padding: "6px 10px", borderRadius: "4px", fontSize: "8px", letterSpacing: "1px", fontFamily: "'Space Mono', monospace", flexShrink: 0, border: "1px solid #1a3a1a",
                }}>{copied === "char" ? "✓" : "COPY"}</button>
              </div>
            )}

            {/* Scenes header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
              <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#ff2d78", fontWeight: "700" }}>6-SCENE JOURNEY</div>
              <button className="cbtn" onClick={copyAllPrompts} style={{
                background: copied === "all" ? "#00e5cc" : "#111",
                color: copied === "all" ? "#000" : "#444",
                padding: "6px 11px", borderRadius: "5px", fontSize: "8px", letterSpacing: "1px", fontFamily: "'Space Mono', monospace", border: "1px solid #1a1a1a",
              }}>{copied === "all" ? "✓ COPIED ALL" : "⬇ COPY ALL 6 PROMPTS"}</button>
            </div>

            {/* Scene cascade with journey connectors */}
            <div style={{ marginBottom: "20px" }}>
              {output.scenes?.map((scene, i) => (
                <div key={i}>
                  <div className="scard" style={{ background: "#0a0a0a", border: "1px solid #141414", borderRadius: "10px", overflow: "hidden", marginBottom: "0" }}>
                    {/* Scene header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderBottom: "1px solid #111", background: "#0d0d0d" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                        <div className="scene-number">{scene.number}</div>
                        <div>
                          <div style={{ fontSize: "10px", color: "#ddd", fontWeight: "700", letterSpacing: "0.5px" }}>{scene.label}</div>
                          <div style={{ fontSize: "8px", color: "#ff2d7880", marginTop: "1px", fontStyle: "italic" }}>{scene.emotionalState}</div>
                        </div>
                      </div>
                      <button className="cbtn" onClick={() => copyText(scene.seedancePrompt, `s${i}`)} style={{
                        background: copied === `s${i}` ? "#00e5cc" : "#111",
                        color: copied === `s${i}` ? "#000" : "#444",
                        padding: "4px 9px", borderRadius: "4px", fontSize: "8px", letterSpacing: "1px", fontFamily: "'Space Mono', monospace", flexShrink: 0, border: "1px solid #1a1a1a",
                      }}>{copied === `s${i}` ? "✓" : "COPY"}</button>
                    </div>

                    {/* Seedance prompt */}
                    <div style={{ padding: "12px 14px", background: "#060606", borderBottom: "1px solid #0f0f0f", fontSize: "10px", lineHeight: "1.9", color: "#00e5cc", whiteSpace: "pre-wrap", fontFamily: "'Space Mono', monospace" }}>
                      {scene.seedancePrompt}
                    </div>

                    {/* Camera + transition */}
                    <div style={{ padding: "8px 14px", display: "flex", flexDirection: "column", gap: "3px" }}>
                      {scene.camera && <div style={{ fontSize: "9px", color: "#2a2a2a" }}>📷 {scene.camera}</div>}
                      {scene.transitionToNext && i < 5 && (
                        <div style={{ fontSize: "9px", color: "#ff2d7860" }}>→ {scene.transitionToNext}</div>
                      )}
                    </div>
                  </div>

                  {/* Journey connector between scenes */}
                  {i < (output.scenes.length - 1) && (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "4px 0" }}>
                      <div className="journey-line" />
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Editing notes */}
            {output.editingNotes && (
              <div style={{ padding: "16px 18px", background: "#0a0810", border: "1px solid #1a1430", borderRadius: "8px", marginBottom: "12px" }}>
                <div style={{ fontSize: "8px", color: "#8855cc", letterSpacing: "2px", marginBottom: "8px", fontWeight: "700" }}>✂ CAPCUT EDIT GUIDE</div>
                <div style={{ fontSize: "10px", color: "#555", lineHeight: "1.7" }}>{output.editingNotes}</div>
              </div>
            )}

            {/* Caption + Hooks */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "8px" }}>
              <div style={{ padding: "16px", background: "#0a0a0a", border: "1px solid #141414", borderRadius: "9px" }}>
                <div style={{ fontSize: "8px", color: "#ff2d78", letterSpacing: "2px", marginBottom: "9px", fontWeight: "700" }}>📱 CAPTION</div>
                <div style={{ fontSize: "11px", color: "#bbb", lineHeight: "1.6", marginBottom: "10px" }}>{output.caption}</div>
                <button className="cbtn" onClick={() => copyText(output.caption, "cap")} style={{
                  background: copied === "cap" ? "#00e5cc" : "#111", color: copied === "cap" ? "#000" : "#444",
                  padding: "6px", borderRadius: "4px", fontSize: "8px", letterSpacing: "1px", fontFamily: "'Space Mono', monospace", width: "100%", border: "1px solid #1a1a1a",
                }}>{copied === "cap" ? "✓ COPIED" : "COPY CAPTION"}</button>
              </div>
              <div style={{ padding: "16px", background: "#0a0a0a", border: "1px solid #141414", borderRadius: "9px" }}>
                <div style={{ fontSize: "8px", color: "#ff2d78", letterSpacing: "2px", marginBottom: "9px", fontWeight: "700" }}>🧲 HOOKS</div>
                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                  {output.hooks?.map((hook, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "7px" }}>
                      <div style={{ fontSize: "10px", color: "#999", flex: 1 }}>"{hook}"</div>
                      <button className="cbtn" onClick={() => copyText(hook, `h${i}`)} style={{
                        background: copied === `h${i}` ? "#00e5cc" : "#111", color: copied === `h${i}` ? "#000" : "#444",
                        padding: "3px 7px", borderRadius: "3px", fontSize: "8px", fontFamily: "'Space Mono', monospace", flexShrink: 0, border: "1px solid #1a1a1a",
                      }}>{copied === `h${i}` ? "✓" : "COPY"}</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{ marginTop: "60px", paddingTop: "18px", borderTop: "1px solid #0f0f0f", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: "13px", color: "#1a1a1a" }}>NANDYVISUALS</span>
          <span style={{ fontSize: "8px", color: "#141414", letterSpacing: "1px" }}>JOURNEY ENGINE · SEEDANCE 2.0</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
